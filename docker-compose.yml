version: "3.9"

# ── Biến dùng chung ──────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://analyst:analyst123@postgres/airflow_db
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: crm_secret_key_2024
    POSTGRES_HOST: postgres
    POSTGRES_USER: analyst
    POSTGRES_PASSWORD: analyst123
    POSTGRES_DB: crm_db
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL (dùng chung cho CRM data + Airflow metadata) ─
  postgres:
    image: postgres:15
    container_name: crm_postgres
    env_file: .env
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst123
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/create_airflow_db.sql:/docker-entrypoint-initdb.d/00_airflow_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin ──────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crm_pgadmin
    env_file: .env
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ── Jupyter Notebook ─────────────────────────────────────────
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: crm_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./scripts:/home/jovyan/work/scripts
      - ./data:/home/jovyan/work/data
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst123
      POSTGRES_DB: crm_db
    depends_on:
      postgres:
        condition: service_healthy

  # ── Airflow: Init DB (chỉ chạy 1 lần) ───────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@airflow.com
    restart: "no"

  # ── Airflow: Webserver ───────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # ── Airflow: Scheduler ───────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  postgres_data:
